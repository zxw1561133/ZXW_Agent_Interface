<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 地图外框（模拟地图边界） -->
  <rect x="3" y="3" width="18" height="18" rx="1" stroke="#2f80ed" stroke-width="1.2" fill="#f5f8ff"/>
  <!-- 主网格线（更清晰的地图网格） -->
  <path d="M3 9 H21" stroke="#2f80ed" stroke-width="1" opacity="0.7"/>
  <path d="M3 15 H21" stroke="#2f80ed" stroke-width="1" opacity="0.7"/>
  <path d="M9 3 V21" stroke="#2f80ed" stroke-width="1" opacity="0.7"/>
  <path d="M15 3 V21" stroke="#2f80ed" stroke-width="1" opacity="0.7"/>
  <!-- 地图定位点（增强地图属性） -->
  <circle cx="12" cy="12" r="2" fill="#2f80ed"/>
  <circle cx="12" cy="12" r="0.8" fill="#ffffff"/>
  <!-- 辅助装饰（模拟地图刻度） -->
  <path d="M3 6 H4" stroke="#2f80ed" stroke-width="1.2"/>
  <path d="M20 6 H21" stroke="#2f80ed" stroke-width="1.2"/>
  <path d="M6 3 V4" stroke="#2f80ed" stroke-width="1.2"/>
  <path d="M6 20 V21" stroke="#2f80ed" stroke-width="1.2"/>
</svg>
